PACKAGE_NAME="speakerphone-jieli"
PACKAGE_VERSION="1.0.0"

# Rebuild snd-usb-audio from kernel source with Jieli quirk patch
BUILT_MODULE_NAME[0]="snd-usb-audio"
DEST_MODULE_LOCATION[0]="/updates/sound/usb"

AUTOINSTALL="yes"
REMAKE_INITRD="no"
