PACKAGE_NAME="speakerphone-jieli"
PACKAGE_VERSION="1.0.0"

# Prebuilt binary — no compilation needed
# The original Armbian snd-usb-audio module works perfectly with the Jieli speakerphone.
# Building from vanilla linux-source produces a module that breaks capture (EOVERFLOW on
# every isochronous URB frame), so we ship the known-working Armbian binary directly.

BUILT_MODULE_NAME[0]="snd-usb-audio"
BUILT_MODULE_LOCATION[0]="prebuilt/"
DEST_MODULE_LOCATION[0]="/updates/dkms"

BUILT_MODULE_NAME[1]="snd-usbmidi-lib"
BUILT_MODULE_LOCATION[1]="prebuilt/"
DEST_MODULE_LOCATION[1]="/updates/dkms"

# No-op build — we ship prebuilt .ko files
MAKE[0]="echo 'Using prebuilt modules, no compilation needed'"

# Kernel version these binaries were built for
# Mismatched kernel versions will be caught by vermagic check
BUILD_EXCLUSIVE_KERNEL="6.18.10-current-meson64"

AUTOINSTALL="yes"
